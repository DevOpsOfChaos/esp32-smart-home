services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_BIND_ADDRESS:-0.0.0.0}:${MQTT_HOST_PORT:-1883}:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -t '$$SYS/broker/version' -C 1 -W 5 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  influxdb:
    image: influxdb:2
    restart: unless-stopped
    ports:
      - "${INFLUX_BIND_ADDRESS:-127.0.0.1}:${INFLUX_HOST_PORT:-8086}:8086"
    environment:
      TZ: "${TZ:-Europe/Berlin}"
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USERNAME:-smarthome}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD:-change-me-influx-password}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG:-smarthome}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET:-smarthome}"
      DOCKER_INFLUXDB_INIT_RETENTION: "${INFLUXDB_BUCKET_RETENTION:-365d}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN:-change-me-influx-token}"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 10

  nodered:
    build:
      context: .
      dockerfile: ./nodered/Dockerfile
    restart: unless-stopped
    ports:
      - "${NODERED_BIND_ADDRESS:-0.0.0.0}:${NODERED_HOST_PORT:-1880}:1880"
    environment:
      TZ: "${TZ:-Europe/Berlin}"
      PORT: 1880
      MQTT_HOST: "${MQTT_HOST:-mosquitto}"
      MQTT_PORT: "1883"
      MQTT_BASE_TOPIC: "${MQTT_BASE_TOPIC:-smarthome}"
      SQLITE_PATH: /data/sqlite/smarthome.sqlite
      NODERED_CREDENTIAL_SECRET: "${NODERED_CREDENTIAL_SECRET:-change-me-local-only}"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: "${INFLUXDB_ADMIN_TOKEN:-change-me-influx-token}"
      INFLUX_ORG: "${INFLUXDB_ORG:-smarthome}"
      INFLUX_BUCKET: "${INFLUXDB_BUCKET:-smarthome}"
      WEATHER_PROVIDER: "${WEATHER_PROVIDER:-open-meteo}"
      WEATHER_LOCATION_LABEL: "${WEATHER_LOCATION_LABEL:-}"
      WEATHER_LATITUDE: "${WEATHER_LATITUDE:-}"
      WEATHER_LONGITUDE: "${WEATHER_LONGITUDE:-}"
      WEATHER_POLL_MINUTES: "${WEATHER_POLL_MINUTES:-15}"
      WEATHER_API_BASE_URL: "${WEATHER_API_BASE_URL:-https://api.open-meteo.com/v1/forecast}"
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - nodered_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1880/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
  influxdb_data:
  influxdb_config:
